"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory \
$git_branch \
$git_status \
$fill \
$hostname \
$time\n \
$shell\
[>](fg:fg) 
"""

palette = "kanagawa-wave"

[character]
success_symbol = "[[¾░äø](green) ŌØ»](orange)"
error_symbol = "[[¾░äø](red) ŌØ»](orange)"
vimcmd_symbol = "[¾░äø ŌØ«](subtext1)"

[palettes.rose-pine]
overlay = '#26233a'
love = '#eb6f92'
gold = '#f6c177'
rose = '#ebbcba'
pine = '#31748f'
foam = '#9ccfd8'
iris = '#c4a7e7'

[palettes.kanagawa-wave]
overlay = "#1F1F28"
fg = "#DCD7BA"
red = "#E46876"
green = "#98BB6C"
blue = "#7E9CD8"
yellow = "#E6C384"
magenta = "#957FB8"
orange = "#FFA066"
cyan = "#7AA89F"
black = "#16161D"
white = "#DCD7BA"

[directory]
format = "(fg:overlay)[ $path ]($style)(fg:overlay)"
style = "bg:overlay fg:blue"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
Documents = "¾░łÖ"
Downloads = "’ĆÖ "
Music = "’Ćü "
Pictures = "’ĆŠ "

[fill]
style = "fg:overlay"
symbol = " "

[git_branch]
format = "(fg:overlay)[ $symbol $branch ]($style)(fg:overlay)"
style = "bg:overlay fg:orange"
symbol = "’Éś"

[git_status]
style = "bg:overlay fg:red"
format = '(fg:overlay)[$all_status$ahead_behind]($style)(fg:overlay)'
disabled = true

[time]
disabled = false
format = "(fg:overlay)[ $time ŅÄä ]($style)(fg:overlay)"
style = "bg:overlay fg:cyan"
time_format = "%I:%M%P"
use_12hr = true

[username]
disabled = false
format = "(fg:overlay)[ ’ō┐ $user ]($style)(fg:overlay)"
show_always = true
style_root = "bg:overlay fg:blue"
style_user = "bg:overlay fg:blue"

[hostname]
ssh_only = false
format = '[$ssh_symbol](bold blue) [$hostname](bold yellow) '
trim_at = '.'
disabled = false
ssh_symbol = "¾░ŻĆ"

[shell]
disabled = false
style = "fg:orange"
format = "[$indicator]($style)"

[mise]
disabled = false

[memory_usage]
disabled = false
symbol = "­¤ÉÅ"
threshold = -1
format = '$symbol [${ram_pct}]($style) '
style = "fg:green"

[battery]
disabled = false
format = "[$symbol$percentage]($style) "

[[battery.display]]
threshold = 100
style = 'fg:fg'

[[battery.display]]
threshold = 10
style = "fg:red bold"

[[battery.display]]
threshold = 30
style = "fg:yellow bold"

