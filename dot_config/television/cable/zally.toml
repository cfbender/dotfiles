[metadata]
name = "zally"
description = "Project directories prioritized by active zellij sessions"
requirements = ["zellij"]

[source]
command = '''
STATE_DIR="$HOME/.local/state/zally"

# Build session status lookup: "|NAME=S|..." (C=current, R=running, E=exited)
SESS=""
while IFS= read -r line; do
  s=${line%% *}
  [[ -z "$s" ]] && continue
  st=R
  [[ "$line" == *"(current)"* ]] && st=C
  [[ "$line" == *"EXITED"* ]] && st=E
  SESS+="|${s}=${st}"
done < <(zellij list-sessions -n 2>/dev/null)
SESS+="|"

SORTABLE=""
for dir in ~/code/pdq/* ~/code/github/* ~/code/playground/* ~/.local/share/chezmoi; do
  [[ -d "$dir" ]] || continue
  name=${dir##*/}
  name=${name^^}
  case "$SESS" in
    *"|${name}=C|"*) icon="⚡"; prio=1 ;;
    *"|${name}=R|"*) icon="●";  prio=1 ;;
    *"|${name}=E|"*) icon="💤"; prio=2 ;;
    *)               icon="○";  prio=3 ;;
  esac
  f="$STATE_DIR/$name"
  if [[ -f "$f" ]]; then
    mtime=$(stat -f '%m' "$f")
  else
    mtime=0
  fi
  SORTABLE+="${prio}|${mtime}|${dir}"$'\t'"${icon} ${name}"$'\n'
done

printf '%s' "$SORTABLE" | sort -t'|' -k1,1n -k2,2rn | while IFS='|' read -r _ _ rest; do
  [[ -n "$rest" ]] && printf '%s\n' "$rest"
done
'''
display = "{split:\t:1}"
output = "{split:\t:0}"
shell = "bash"

[preview]
command = '''
display='{split:\t:1}'
session="${display#* }"
icon="${display%% *}"
dir='{split:\t:0}'

echo "━━━ $session ━━━"
echo ""

if [[ "$icon" == "○" ]]; then
  echo "No active session"
  echo ""
  ls -1 --color=always "$dir" 2>/dev/null | head -40
  exit 0
fi

if [[ "$icon" == "💤" ]]; then
  echo "💤 EXITED — attach to resurrect"
  exit 0
fi

ZELLIJ_SESSION_NAME="$session" zellij action list-panes -t -c -j 2>/dev/null | jq -r '
  def short_cwd: gsub("^" + env.HOME; "~");
  def short_cmd: split("/") | last;
  def trim(n): if length > n then .[:n] + "…" else . end;
  (group_by(.tab_position)[] |
    "\n┃ 󰓩  " + (.[0].tab_name | if . == " " or . == "" or . == null then "Tab " + (.[0].tab_position + 1 | tostring) else . end),
    "┃ ──────────────────",
    (.[] | select((.is_plugin | not) and (.is_floating | not)) |
      if (.pane_command // "") != "" and .pane_command != "-" then
        "┃   " + (.pane_command | short_cmd) + "  " + (.pane_cwd | short_cwd)
      else
        "┃   " + (.title | trim(60))
      end
    )
  )
'
'''
shell = "bash"

[actions.kill]
description = "Kill selected zellij session"
command = "zellij kill-session \"$(basename '{split:\t:0}' | tr '[:lower:]' '[:upper:]')\""
mode = "fork"

[keybindings]
ctrl-d = ["actions:kill", "reload_source"]
