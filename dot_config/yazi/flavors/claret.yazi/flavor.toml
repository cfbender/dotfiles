[manager]
marker_copied = { fg = "#8FA86E", bg = "#8FA86E" }
marker_cut = { fg = "#C44536", bg = "#C44536" }
marker_marked = { fg = "#B04A68", bg = "#B04A68" }
marker_selected = { fg = "#D4A76A", bg = "#D4A76A" }

cwd = { fg = "#D4A76A" }
hovered = { reversed = true }
preview_hovered = { reversed = true }

find_keyword = { fg = "#D4A76A", bg = "#180810" }
find_position = {}

tab_active = { reversed = true }
tab_inactive = {}
tab_width = 1

count_copied = { fg = "#180810", bg = "#8FA86E" }
count_cut = { fg = "#180810", bg = "#C44536" }
count_selected = { fg = "#180810", bg = "#D4A76A" }

border_symbol = "│"
border_style = { fg = "#DDD3C7" }


[mode]
normal_main = { fg = "#180810", bg = "#8995A8" }
normal_alt = { fg = "#8995A8", bg = "#180810" }
select_main = { fg = "#180810", bg = "#C75B7A" }
select_alt = { fg = "#C75B7A", bg = "#180810" }
unset_main = { fg = "#180810", bg = "#D4A76A" }
unset_alt = { fg = "#D4A76A", bg = "#180810" }


[status]
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }
overall = { fg = "#DDD3C7", bg = "#180810" }

progress_label = { fg = "#8995A8", bg = "#180810", bold = true }
progress_normal = { fg = "#180810", bg = "#180810" }
progress_error = { fg = "#180810", bg = "#180810" }

perm_type = { fg = "#8FA86E" }
perm_read = { fg = "#D4A76A" }
perm_write = { fg = "#C44536" }
perm_exec = { fg = "#7A9460" }
perm_sep = { fg = "#B04A68" }


[pick]
border = { fg = "#8995A8" }
active = { fg = "#C75B7A", bold = true }
inactive = {}

[input]
border = { fg = "#8995A8" }
title = {}
value = {}
selected = { reversed = true }

[completion]
border = { fg = "#8995A8" }
active = { reversed = true }
inactive = {}

[tasks]
border = { fg = "#8995A8" }
title = {}
hovered = { fg = "#C75B7A" }

[which]
cols = 2
separator = " - "
separator_style = { fg = "#9E9288" }
mask = { bg = "#180810" }
rest = { fg = "#9E9288" }
cand = { fg = "#8995A8" }
desc = { fg = "#DDD3C7" }

[help]
on = { fg = "#8FA86E" }
run = { fg = "#C75B7A" }
desc = {}
hovered = { reversed = true, bold = true }
footer = { fg = "#180810", bg = "#DDD3C7" }

[notify]
title_info = { fg = "#8FA86E" }
title_warn = { fg = "#D4A76A" }
title_error = { fg = "#C44536" }

[filetype]
rules = [
    # images
    { mime = "image/*", fg = "#D4A76A" },

    # media
    { mime = "{audio,video}/*", fg = "#B04A68" },

    # archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#C44536" },

    # documents
    { mime = "application/{pdf,doc,rtf,vnd.*}", fg = "#9A3D5A" },

    # broken links
    { name = "*", is = "orphan", fg = "#C44536" },

    # executables
    { name = "*", is = "exec", fg = "#8FA86E" },

    # fallback
    { name = "*", fg = "#DDD3C7" },
    { name = "*/", fg = "#8995A8" },
]
